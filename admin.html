<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixLinks Admin Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #1a73e8; --bg: #f4f7f9; --border: #e0e0e0; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Custom Scrollbar ให้ดูสะอาดตา */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        /* Navbar */
        .navbar { background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); height: 50px; flex-shrink: 0; }
        .nav-user { display: flex; align-items: center; gap: 15px; }
        .user-email { color: var(--primary); font-weight: bold; font-size: 14px; }
        .btn-logout { background: #fff; color: #d93025; border: 1px solid #f8d7da; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }

        /* Main Layout */
        .main-content { display: flex; flex: 1; overflow: hidden; }
        .panel { display: flex; flex-direction: column; padding: 15px; gap: 15px; overflow: hidden; }
        .left-panel { flex: 1; border-right: 2px solid var(--border); background: #fff; }
        .right-panel { flex: 1.3; background: var(--bg); }

        /* Components */
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid var(--border); flex-shrink: 0; }
        h2 { margin: 0 0 10px 0; font-size: 16px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        
        input[type="text"], input[type="date"], select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 13px; }
        input[type="text"]:focus, select:focus { border-color: var(--primary); outline: none; }
        
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #e8f0fe; color: var(--primary); }
        .btn-danger { background: #fce8e6; color: #d93025; }

        /* Scrollable Areas */
        #search-results { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        #results-list { flex: 1; overflow-y: auto; padding-right: 5px; margin-top: 5px; }
        
        .table-card { display: flex; flex-direction: column; padding: 0; overflow: hidden; }
        .card-header { padding: 12px 15px; background: #f8f9fa; font-weight: bold; font-size: 14px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .table-wrapper { flex: 1; overflow-y: auto; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 15px; text-align: left; border-bottom: 1px solid #eee; }
        /* ล็อคหัวตารางให้อยู่กับที่ */
        th { position: sticky; top: 0; background: #f1f3f4; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        
        .rank-badge { background: #e8f0fe; color: var(--primary); padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .action-tag { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        /* Stats Box */
        .stats-container { display: flex; justify-content: flex-end; gap: 20px; flex: 1; flex-wrap: wrap; }
        .stat-item { display: flex; align-items: center; background: #f8f9fa; padding: 4px 12px; border-radius: 8px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i data-lucide="shield-check" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2>Admin Login</h2>
        <input type="email" id="login-email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" id="login-pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px;">
        <button class="btn btn-primary" onclick="login()" style="width:100%; justify-content:center;">เข้าสู่ระบบ</button>
    </div>
</div>

<nav class="navbar">
    <div style="font-weight: bold; color: var(--primary); font-size: 18px;">MixLinks Admin Portal</div>
    <div class="nav-user">
        <span class="user-email" id="display-user"></span>
        <button class="btn-logout" onclick="logout()"><i data-lucide="log-out" style="width:14px;"></i> ออกจากระบบ</button>
    </div>
</nav>

<div class="main-content">
    <!-- ฝั่งซ้าย: ระบบค้นหา -->
    <div class="panel left-panel">
        <div class="card">
            <h2><i data-lucide="search"></i> ค้นหาข้อมูล</h2>
            <div style="display:flex; gap:8px; margin-bottom:10px;">
                <input type="text" id="searchInput" placeholder="พิมพ์ชื่อเรื่องที่ต้องการค้นหา..." oninput="searchData()" style="flex:1; margin-bottom:0;">
                <button class="btn btn-danger" onclick="clearSearch()" title="ล้างการค้นหา"><i data-lucide="x" style="width:16px;"></i></button>
            </div>
            <button class="btn btn-secondary" id="sortBtn" onclick="toggleSort()" style="width:100%; justify-content:center;">
                <i data-lucide="arrow-down-narrow-wide" style="width:16px;"></i> <span id="sortText">เรียง: ใหม่ไปเก่า</span>
            </button>
        </div>
        
        <!-- ส่วนแสดงผลการค้นหา -->
        <div id="search-results">
            <div id="search-count" style="font-size:13px; color:#666; font-weight:bold; border-left: 3px solid var(--primary); padding-left: 8px; flex-shrink: 0;"></div>
            <div id="results-list"></div>
        </div>
    </div>

    <!-- ฝั่งขวา: ระบบ Logs & Analytics -->
    <div class="panel right-panel">
        <div class="card" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <div style="display:flex; align-items:center; gap:8px;">
                <i data-lucide="calendar" style="color:var(--primary); width:18px;"></i>
                <input type="date" id="dateFilter" onchange="loadLogs()" style="margin-bottom:0; width:auto; cursor:pointer; font-weight:bold;">
            </div>
            
            <div class="stats-container">
                <div class="stat-item">
                    <span style="font-size:13px; color:#666">จำนวนไฟล์ที่ถูกกด:</span>
                    <span id="unique-file-count" style="font-size:20px; font-weight:bold; color:#34a853; margin-left:8px;">0</span>
                </div>
                <div class="stat-item" style="background:#e8f0fe; border-color:#d2e3fc;">
                    <span style="font-size:13px; color:#1a73e8">ยอดกดรวม:</span>
                    <span id="today-count" style="font-size:20px; font-weight:bold; color:var(--primary); margin-left:8px;">0</span>
                </div>
            </div>
        </div>

        <!-- ตารางยอดนิยม -->
        <div class="card table-card" style="flex: 1; max-height: 35vh;">
            <div class="card-header">
                <span style="color:#d93025"><i data-lucide="flame" style="width:14px; vertical-align:middle;"></i> ไฟล์ยอดนิยม</span>
                <select id="topLimit" onchange="renderLogsUI()">
                    <option value="5">5 อันดับ</option>
                    <option value="10">10 อันดับ</option>
                    <option value="15">15 อันดับ</option>
                    <option value="20">20 อันดับ</option>
                </select>
            </div>
            <div class="table-wrapper">
                <table id="top-table">
                    <thead><tr><th width="40">#</th><th>ชื่อไฟล์ / หัวข้อ</th><th width="80" style="text-align:center;">จำนวนครั้ง</th></tr></thead>
                    <tbody id="top-body"></tbody>
                </table>
            </div>
        </div>

        <!-- ตารางประวัติล่าสุด -->
        <div class="card table-card" style="flex: 1.5;">
            <div class="card-header" style="flex-wrap: wrap; gap: 10px;">
                <div style="display:flex; align-items:center; gap:5px; width:100%; justify-content:space-between;">
                    <span><i data-lucide="clock" style="width:14px; vertical-align:middle;"></i> ประวัติล่าสุด</span>
                    <select id="logLimit" onchange="renderLogsUI()">
                        <option value="20">20 รายการ</option>
                        <option value="50">50 รายการ</option>
                        <option value="all">ทั้งหมด</option>
                    </select>
                </div>
                <!-- ชุดตัวกรอง -->
                <div style="display:flex; gap:8px; width:100%;">
                    <select id="userFilter" onchange="renderLogsUI()" style="flex:1;">
                        <option value="all">-- ผู้ใช้ทุกคน --</option>
                    </select>
                    <div style="display:flex; flex:2; gap:5px;">
                        <input type="text" id="logSearchInput" placeholder="ค้นหาประวัติไฟล์..." oninput="renderLogsUI()" style="width:100%; margin-bottom:0;">
                        <button class="btn btn-danger" onclick="clearLogSearch()" style="padding:6px 10px;" title="ล้าง"><i data-lucide="x" style="width:14px;"></i></button>
                    </div>
                </div>
            </div>
            <div class="table-wrapper">
                <table id="log-table">
                    <thead><tr><th>เวลา</th><th>ผู้ใช้งาน</th><th>ไฟล์</th><th>Action</th></tr></thead>
                    <tbody id="log-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCN3DS1X6pRi6LxckAitWHmLmsnx5WF7XA",
        authDomain: "linksearch-84695.firebaseapp.com",
        databaseURL: "https://linksearch-84695-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "linksearch-84695",
        storageBucket: "linksearch-84695.appspot.com",
        messagingSenderId: "886580157297",
        appId: "1:886580157297:web:2d843a0f7db6948f9f74d0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let masterData = [];
    let isNewestFirst = true;
    let dailyLogs = []; 

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('display-user').innerText = user.email;
            document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];
            initData();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
        }
    });

    function formatThaiDisplay(isoString) {
        if (!isoString) return '-';
        try { return new Date(isoString).toLocaleDateString('th-TH', { timeZone: 'Asia/Bangkok' }); } catch (e) { return isoString; }
    }
    function parseThaiDate(dateStr) {
        if (!dateStr) return 0;
        try {
            if (dateStr.includes('T')) return new Date(dateStr).getTime();
            const parts = dateStr.split('/');
            return new Date(parseInt(parts[2]) - 543, parseInt(parts[1]) - 1, parseInt(parts[0])).getTime();
        } catch (e) { return 0; }
    }

    function initData() {
        db.ref('MixLinks').on('value', snap => {
            masterData = Object.values(snap.val() || {}).filter(i => i !== null);
            sortMasterData();
            searchData();
        });
        loadLogs();
    }

    function sortMasterData() {
        masterData.sort((a, b) => {
            const da = parseThaiDate(a.spkdate);
            const db = parseThaiDate(b.spkdate);
            return isNewestFirst ? db - da : da - db;
        });
    }

    function toggleSort() {
        isNewestFirst = !isNewestFirst;
        document.getElementById('sortText').innerText = isNewestFirst ? "เรียง: ใหม่ไปเก่า" : "เรียง: เก่าไปใหม่";
        sortMasterData();
        searchData();
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        searchData();
    }

    function searchData() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const searchResultsDiv = document.getElementById('search-results');
        const resultsList = document.getElementById('results-list');
        
        if (query === "") {
            searchResultsDiv.style.display = 'none';
            return;
        }

        const terms = query.split(' ').filter(t => t !== '');
        const results = masterData.filter(item => terms.every(term => (item.linkname || "").toLowerCase().includes(term)));
        
        searchResultsDiv.style.display = 'flex';
        document.getElementById('search-count').innerText = `พบทั้งหมด ${results.length} รายการ`;
        
        if (results.length === 0) {
            resultsList.innerHTML = '<div style="padding:40px; text-align:center; color:#888;">ไม่พบข้อมูลที่คุณค้นหา</div>';
            return;
        }

        resultsList.innerHTML = results.map(item => `
            <div style="background: #fff; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-weight: bold; font-size: 14px; color: #202124; margin-bottom: 2px;">${item.linkname}</div>
                    <div style="font-size: 12px; color: #70757a; display: flex; align-items: center; gap: 4px;">
                        <i data-lucide="calendar" style="width:12px;"></i> ${formatThaiDisplay(item.spkdate)}
                    </div>
                </div>
                <div style="display: flex; gap: 5px;">
                    <button class="btn-icon" onclick="handleAction('${item.linkname}', '${item.link}', 'copy')" style="background:#fff; border:1px solid #ddd; padding:6px; border-radius:6px; cursor:pointer;" title="Copy"><i data-lucide="copy" style="width:14px;"></i></button>
                    <button class="btn-icon" onclick="handleAction('${item.linkname}', '${item.link}', 'open')" style="background:#fff; border:1px solid #ddd; padding:6px; border-radius:6px; cursor:pointer;" title="Open"><i data-lucide="external-link" style="width:14px;"></i></button>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function loadLogs() {
        const targetDate = document.getElementById('dateFilter').value;
        db.ref('logs').on('value', snap => {
            const logs = Object.values(snap.val() || {});
            dailyLogs = logs.filter(l => new Date(l.timestamp).toISOString().split('T')[0] === targetDate);
            
            // 1. อัปเดตยอดกดรวม
            document.getElementById('today-count').innerText = dailyLogs.length;

            // 2. คำนวณยอดไฟล์ที่ไม่ซ้ำ (Unique Files)
            const uniqueFiles = new Set(dailyLogs.map(l => l.linkname));
            document.getElementById('unique-file-count').innerText = uniqueFiles.size;

            // 3. จัดการรายชื่อผู้ใช้
            const users = [...new Set(dailyLogs.map(l => l.user))].sort();
            const userSelect = document.getElementById('userFilter');
            const currentUser = userSelect.value; 
            
            userSelect.innerHTML = '<option value="all">-- ผู้ใช้ทุกคน --</option>' + 
                users.map(u => `<option value="${u}">${u.split('@')[0]}</option>`).join('');
            
            if(users.includes(currentUser)) userSelect.value = currentUser;

            renderLogsUI(); 
        });
    }

    function clearLogSearch() {
        document.getElementById('logSearchInput').value = '';
        renderLogsUI();
    }

    function renderLogsUI() {
        const topLimit = parseInt(document.getElementById('topLimit').value);
        const freq = {};
        dailyLogs.forEach(l => freq[l.linkname] = (freq[l.linkname] || 0) + 1);
        const sortedTop = Object.keys(freq).map(k => ({n:k, c:freq[k]})).sort((a,b)=>b.c-a.c).slice(0, topLimit);
        
        const topBody = document.getElementById('top-body');
        if(sortedTop.length === 0) {
            topBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888;">ไม่มีข้อมูลในวันนี้</td></tr>';
        } else {
            topBody.innerHTML = sortedTop.map((item, i) => `
                <tr><td><span class="rank-badge">${i+1}</span></td><td>${item.n}</td><td style="text-align:center; font-size:14px;"><b>${item.c}</b></td></tr>
            `).join('');
        }

        const userFilter = document.getElementById('userFilter').value;
        const searchInput = document.getElementById('logSearchInput').value.toLowerCase().trim();
        const logLimit = document.getElementById('logLimit').value;

        let filteredLogs = [...dailyLogs].reverse(); 

        if (userFilter !== 'all') filteredLogs = filteredLogs.filter(l => l.user === userFilter);
        if (searchInput !== '') filteredLogs = filteredLogs.filter(l => (l.linkname || '').toLowerCase().includes(searchInput));
        if (logLimit !== 'all') filteredLogs = filteredLogs.slice(0, parseInt(logLimit));

        const logBody = document.getElementById('log-body');
        if(filteredLogs.length === 0) {
            logBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888;">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</td></tr>';
        } else {
            logBody.innerHTML = filteredLogs.map(l => `
                <tr>
                    <td style="color:#70757a; font-size:12px;">${new Date(l.timestamp).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} น.</td>
                    <td>${l.user.split('@')[0]}</td>
                    <td style="max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${l.linkname}">${l.linkname}</td>
                    <td><span class="action-tag" style="background:${l.action==='copy'?'#e8f0fe':'#e6f4ea'}; color:${l.action==='copy'?'#1a73e8':'#1e8e3e'}">${l.action}</span></td>
                </tr>
            `).join('');
        }
    }

    function handleAction(name, url, type) {
        // 1. บันทึกประวัติลง Logs
        db.ref('logs').push({ user: auth.currentUser.email, linkname: name, action: type, timestamp: new Date().toISOString() });
        
        // 2. ถ้าเป็นการกดปุ่ม Copy
        if (type === 'copy') { 
            // ประกอบร่างข้อความ: ชื่อเรื่อง + ขึ้นบรรทัดใหม่ (\n) + ลิงก์
            const textToCopy = name + "\n" + url;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                // เปลี่ยนข้อความแจ้งเตือนนิดหน่อยให้รู้ว่าก็อปไปทั้งคู่แล้ว
                alert('คัดลอก "ชื่อและลิงก์" เรียบร้อยแล้ว!\n\n' + name); 
            }); 
        } 
        // 3. ถ้าเป็นการกดปุ่ม Open
        else { 
            window.open(url, '_blank'); 
        }
    }

    function login() {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-pass').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert("ลองใหม่อีกครั้ง: " + err.message));
    }
    function logout() { auth.signOut(); }
</script>
</body>
</html>
