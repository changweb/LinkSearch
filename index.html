<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixLinks - Search System v2.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { text-align: center; color: #1a73e8; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .btn-group { display: flex; gap: 10px; margin: 10px 0; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: #1a73e8; color: white; flex: 2; }
        .btn-secondary { background: #e8f0fe; color: #1a73e8; flex: 1; }
        .btn-sort { background: #fff; border: 1px solid #1a73e8; color: #1a73e8; width: 100%; margin-bottom: 15px; }
        .btn-logout { background: #f8f9fa; color: #666; width: 100%; margin-top: 15px; font-size: 14px; border: 1px solid #eee; }
        
        #search-section { display: none; }
        .result-count { font-size: 14px; color: #666; margin-bottom: 10px; padding: 0 5px; font-weight: bold; }
        .result-item { background: #fff; border-bottom: 1px solid #f0f0f0; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .info { flex-grow: 1; padding-right: 15px; }
        .link-name { font-weight: bold; font-size: 1.1em; color: #202124; margin-bottom: 4px; }
        .date { font-size: 0.85em; color: #70757a; display: flex; align-items: center; gap: 4px; }
        .actions { display: flex; gap: 8px; }
        .btn-icon { background: #fff; border: 1px solid #dadce0; padding: 10px; border-radius: 8px; cursor: pointer; color: #5f6368; }
        .btn-icon:hover { background: #f1f3f4; color: #1a73e8; border-color: #1a73e8; }
        .icon { width: 18px; height: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="card">
        <h2>🔒 เข้าสู่ระบบ</h2>
        <input type="email" id="email" placeholder="อีเมลผู้ใช้งาน">
        <input type="password" id="password" placeholder="รหัสผ่าน">
        <button class="btn-primary" onclick="login()">เข้าสู่ระบบ</button>
    </div>

    <div id="search-section">
        <div class="card">
            <h2>🔍 ค้นหา Link การอภิปราย</h2>
            <input type="text" id="searchInput" placeholder="พิมพ์คำที่ต้องการค้นหา..." oninput="checkInput()">
            <div class="btn-group">
                <button class="btn-primary" onclick="startSearch()"><i data-lucide="search" class="icon"></i> ค้นหา</button>
                <button class="btn-secondary" onclick="resetSearch()"><i data-lucide="refresh-cw" class="icon"></i> รีเซ็ต</button>
            </div>
            
            <button class="btn-sort" id="sortBtn" onclick="toggleSort()">
                <i data-lucide="arrow-down-narrow-wide" class="icon"></i> <span id="sortText">เรียงจาก: ใหม่ไปเก่า</span>
            </button>

            <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
        </div>

        <div id="results-card" class="card" style="padding: 20px 0; overflow: hidden; display: none;">
            <div id="count-display" class="result-count" style="padding: 0 20px 10px 20px;"></div>
            <div id="results-list"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCN3DS1X6pRi6LxckAitWHmLmsnx5WF7XA",
        authDomain: "linksearch-84695.firebaseapp.com",
        databaseURL: "https://linksearch-84695-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "linksearch-84695",
        storageBucket: "linksearch-84695.appspot.com",
        messagingSenderId: "886580157297",
        appId: "1:886580157297:web:2d843a0f7db6948f9f74d0"
    };

    let allData = [];
    let filteredData = [];
    let isNewestFirst = true; // สถานะการเรียงลำดับ

    window.onload = function() {
        firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.database();

        window.auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('search-section').style.display = 'block';
                loadData();
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('search-section').style.display = 'none';
                document.getElementById('results-card').style.display = 'none';
            }
        });
        lucide.createIcons();
    };

    function parseThaiDate(dateStr) {
        if (!dateStr) return 0;
        try {
            // รองรับทั้ง ISO (2026-03-24T17:00:00.000Z) และ ไทย (25/03/2569)
            if (dateStr.includes('T')) return new Date(dateStr).getTime();
            const parts = dateStr.split('/');
            if (parts.length !== 3) return 0;
            return new Date(parseInt(parts[2]) - 543, parseInt(parts[1]) - 1, parseInt(parts[0])).getTime();
        } catch (e) { return 0; }
    }

    function formatThaiDisplay(isoString) {
        if (!isoString) return '-';
        try {
            const date = new Date(isoString);
            return date.toLocaleDateString('th-TH', { timeZone: 'Asia/Bangkok' });
        } catch (e) { return isoString; }
    }

    function loadData() {
        window.db.ref('MixLinks').on('value', snapshot => {
            const val = snapshot.val();
            if (val) {
                allData = Object.values(val).filter(i => i !== null);
                sortCurrentData(); // เรียงลำดับตั้งต้น
            }
        });
    }

    window.toggleSort = function() {
        isNewestFirst = !isNewestFirst;
        const btnText = document.getElementById('sortText');
        const sortBtn = document.getElementById('sortBtn');
        
        if (isNewestFirst) {
            btnText.innerText = "เรียงจาก: ใหม่ไปเก่า";
            sortBtn.innerHTML = `<i data-lucide="arrow-down-narrow-wide" class="icon"></i> <span id="sortText">${btnText.innerText}</span>`;
        } else {
            btnText.innerText = "เรียงจาก: เก่าไปใหม่";
            sortBtn.innerHTML = `<i data-lucide="arrow-up-wide-narrow" class="icon"></i> <span id="sortText">${btnText.innerText}</span>`;
        }
        
        sortCurrentData();
        if (document.getElementById('results-card').style.display === 'block') {
            startSearch(); // อัปเดตการแสดงผลทันทีถ้าหน้าจอเปิดอยู่
        }
        lucide.createIcons();
    }

    function sortCurrentData() {
        allData.sort((a, b) => {
            const dateA = parseThaiDate(a.spkdate);
            const dateB = parseThaiDate(b.spkdate);
            return isNewestFirst ? dateB - dateA : dateA - dateB;
        });
    }

    window.checkInput = function() {
        if (document.getElementById('searchInput').value.trim() === "") {
            document.getElementById('results-card').style.display = 'none';
        }
    };

    window.startSearch = function() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        if (query === "") return;

        const terms = query.split(' ').filter(t => t !== '');
        filteredData = allData.filter(item => {
            const name = (item.linkname || "").toLowerCase();
            return terms.every(term => name.includes(term));
        });

        displayResults(filteredData);
    };

    function displayResults(items) {
        const container = document.getElementById('results-list');
        const countDisplay = document.getElementById('count-display');
        container.innerHTML = '';
        
        document.getElementById('results-card').style.display = 'block';
        countDisplay.innerText = `พบทั้งหมด ${items.length} รายการ`;

        if (items.length === 0) {
            container.innerHTML = '<div style="padding:40px; text-align:center; color:#888;">ไม่พบข้อมูล</div>';
            return;
        }

        items.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'result-item';
            const actionButtons = item.link ? `
                <div class="actions">
                    <button class="btn-icon" onclick="handleAction('${item.linkname}', '${item.link}', 'copy')"><i data-lucide="copy" class="icon"></i></button>
                    <button class="btn-icon" onclick="handleAction('${item.linkname}', '${item.link}', 'open')"><i data-lucide="external-link" class="icon"></i></button>
                </div>
            ` : '';

            div.innerHTML = `
                <div class="info">
                    <div class="link-name">${item.linkname || 'ไม่ระบุชื่อ'}</div>
                    <div class="date"><i data-lucide="calendar" style="width:14px;"></i> ${formatThaiDisplay(item.spkdate)}</div>
                </div>
                ${actionButtons}
            `;
            container.appendChild(div);
        });
        lucide.createIcons();
    }

    window.resetSearch = function() {
        document.getElementById('searchInput').value = '';
        document.getElementById('results-card').style.display = 'none';
    };

    window.handleAction = function(name, url, type) {
        window.db.ref('logs').push({
            user: window.auth.currentUser.email,
            linkname: name,
            action: type,
            timestamp: new Date().toISOString()
        });
        if (type === 'copy') {
            navigator.clipboard.writeText(url).then(() => alert('คัดลอกแล้ว!'));
        } else {
            window.open(url, '_blank');
        }
    };

    window.login = function() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        window.auth.signInWithEmailAndPassword(email, pass).catch(() => alert("เข้าสู่ระบบไม่สำเร็จ"));
    };

    window.logout = function() { window.auth.signOut(); };

    document.getElementById('searchInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') startSearch();
    });
</script>
</body>
</html>
