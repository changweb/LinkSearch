<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixLinks - Secure Search</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Chakra Petch', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1557b0; }
        .btn-logout { background: #ff4d4d; color: white; margin-top: 20px; }
        
        /* Search Section */
        #search-section { display: none; }
        .result-item { background: #fff; border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .result-item:last-child { border-bottom: none; }
        .info { flex-grow: 1; }
        .link-name { font-weight: bold; font-size: 1.1em; color: #333; }
        .date { font-size: 0.85em; color: #888; }
        .actions { display: flex; gap: 8px; }
        .btn-icon { background: #f8f9fa; border: 1px solid #ddd; padding: 8px; border-radius: 6px; }
        .btn-icon:hover { background: #e9ecef; }
        .icon { width: 18px; height: 18px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="card">
        <h2>🔒 เข้าสู่ระบบ</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-primary" onclick="login()">เข้าสู่ระบบ</button>
    </div>

    <div id="search-section">
        <div class="card" style="margin-bottom: 20px;">
            <h2>🔍 ค้นหา Link</h2>
            <input type="text" id="searchInput" placeholder="พิมพ์ชื่อการอภิปราย (เว้นวรรคเพื่อเพิ่มคำค้น)...">
            <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
        </div>
        <div id="results" class="card" style="padding: 0;">
            <div style="padding: 20px; text-align: center;">กำลังโหลดข้อมูล...</div>
        </div>
    </div>
</div>

<script>
    // 1. ข้อมูล Config ของคุณ (ตรวจสอบให้มั่นใจว่าใส่ API Key และ App ID ครบถ้วน)
    const firebaseConfig = {
        apiKey: "AIzaSyCN3DS1X6pRi6LxckAitWHmLmsnx5WF7XA",
        authDomain: "linksearch-84695.firebaseapp.com",
        databaseURL: "https://linksearch-84695-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "linksearch-84695",
        storageBucket: "linksearch-84695.appspot.com",
        messagingSenderId: "886580157297",
        appId: "1:886580157297:web:2d843a0f7db6948f9f74d0"
    };

    // 2. เริ่มต้นการทำงาน (แก้ไขจุดที่ Error)
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // 3. ระบบตรวจสอบสถานะ Login (ย้ายมาไว้หลังกำหนดตัวแปร auth)
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('search-section').style.display = 'block';
            loadData();
        } else {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('search-section').style.display = 'none';
        }
    });

    // 4. ฟังก์ชันสำหรับปุ่มกด (ต้องใช้ฟังก์ชันปกติเพื่อให้ HTML เรียกเจอ)
    window.login = function() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        
        if(!email || !pass) {
            alert("กรุณากรอก Email และ Password");
            return;
        }

        auth.signInWithEmailAndPassword(email, pass)
            .then(() => {
                console.log("Login Success");
            })
            .catch(err => {
                console.error(err);
                alert("เข้าสู่ระบบไม่สำเร็จ: " + err.message);
            });
    }

    window.logout = function() {
        auth.signOut();
    }

    // --- ส่วนที่เหลือ (loadData, displayResults, handleAction) ให้คงเดิมไว้ครับ ---
    let allData = [];
    function loadData() {
        db.ref('data').on('value', snapshot => {
            allData = snapshot.val() || [];
            displayResults(allData);
        }, error => {
            console.error("Database Error:", error);
            if(error.code === "PERMISSION_DENIED") {
                alert("คุณไม่มีสิทธิ์เข้าถึงฐานข้อมูล กรุณาเช็ค Rules ใน Firebase");
            }
        });
    }

    function displayResults(items) {
        const container = document.getElementById('results');
        container.innerHTML = '';
        if (!items || items.length === 0) {
            container.innerHTML = '<div style="padding:20px; text-align:center;">ไม่พบข้อมูล</div>';
            return;
        }

        items.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'result-item';
            const isLink = item.link && item.link.startsWith('http');
            const actionHtml = isLink ? `
                <div class="actions">
                    <button class="btn-icon" onclick="handleAction('${item.linkname}', '${item.link}', 'copy')" title="Copy"><i data-lucide="copy" class="icon"></i></button>
                    <button class="btn-icon" onclick="handleAction('${item.linkname}', '${item.link}', 'open')" title="Open"><i data-lucide="external-link" class="icon"></i></button>
                </div>
            ` : '';

            div.innerHTML = `
                <div class="info">
                    <div class="link-name">${item.linkname || 'ไม่มีชื่อ'}</div>
                    <div class="date">${item.spkdate || ''}</div>
                </div>
                ${actionHtml}
            `;
            container.appendChild(div);
        });
        if(window.lucide) lucide.createIcons();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const terms = query.split(' ').filter(t => t !== '');
        const filtered = allData.filter(item => {
            const name = (item.linkname || "").toLowerCase();
            return terms.every(term => name.includes(term));
        });
        displayResults(filtered);
    });

    window.handleAction = function(name, url, type) {
        const user = auth.currentUser;
        const logData = {
            user: user ? user.email : 'unknown',
            linkname: name,
            action: type,
            timestamp: new Date().toISOString(),
            dateOnly: new Date().toLocaleDateString('th-TH')
        };

        db.ref('logs').push(logData);

        if (type === 'copy') {
            navigator.clipboard.writeText(url);
            alert('คัดลอกลิงก์สำเร็จ!');
        } else {
            window.open(url, '_blank');
        }
    }
</script>
