<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixLinks Admin Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --border: #e0e0e0; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .navbar { background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); height: 50px; }
        .nav-user { display: flex; align-items: center; gap: 15px; }
        .user-email { color: var(--primary); font-weight: bold; font-size: 14px; }
        .btn-logout { background: #fff; color: #d93025; border: 1px solid #f8d7da; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-logout:hover { background: #fce8e6; }

        .main-content { display: flex; flex: 1; overflow: hidden; }
        .panel { display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .left-panel { flex: 1; border-right: 2px solid var(--border); background: #fff; }
        .right-panel { flex: 1.2; background: var(--bg); }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); }
        h2 { margin: 0 0 15px 0; font-size: 18px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        
        input[type="text"], input[type="date"], select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 13px; }
        input[type="text"]:focus, select:focus { border-color: var(--primary); outline: none; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #e8f0fe; color: var(--primary); }
        .btn-danger { background: #fce8e6; color: #d93025; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        .rank-badge { background: #e8f0fe; color: var(--primary); padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .action-tag { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        /* Utility styles สำหรับชุด Filter */
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i data-lucide="shield-check" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 15px;"></i>
        <h2>Admin Login</h2>
        <input type="email" id="login-email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" id="login-pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px;">
        <button class="btn btn-primary" onclick="login()" style="width:100%; justify-content:center;">เข้าสู่ระบบ</button>
    </div>
</div>

<nav class="navbar">
    <div style="font-weight: bold; color: var(--primary); font-size: 18px;">MixLinks Admin Portal</div>
    <div class="nav-user">
        <span class="user-email" id="display-user"></span>
        <button class="btn-logout" onclick="logout()"><i data-lucide="log-out" style="width:14px;"></i> ออกจากระบบ</button>
    </div>
</nav>

<div class="main-content">
    <div class="panel left-panel">
        <div class="card">
            <h2><i data-lucide="search"></i> ค้นหาข้อมูล</h2>
            <div style="display:flex; gap:8px; margin-bottom:10px;">
                <input type="text" id="searchInput" placeholder="พิมพ์ชื่อเรื่องที่ต้องการค้นหา..." oninput="searchData()" style="flex:1; margin-bottom:0;">
                <button class="btn btn-danger" onclick="clearSearch()" title="ล้างการค้นหา"><i data-lucide="x" style="width:16px;"></i> ล้าง</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" id="sortBtn" onclick="toggleSort()">
                    <i data-lucide="arrow-down-narrow-wide" style="width:16px;"></i> <span id="sortText">เรียง: ใหม่ไปเก่า</span>
                </button>
            </div>
        </div>
        
        <div id="search-results" style="display: none;">
            <div id="search-count" style="font-size:13px; color:#666; margin-bottom:10px; font-weight:bold; border-left: 3px solid var(--primary); padding-left: 8px;"></div>
            <div id="results-list"></div>
        </div>
    </div>

    <div class="panel right-panel">
        <div class="card">
            <h2><i data-lucide="bar-chart-3"></i> รายงานการใช้งาน</h2>
            <div style="display:flex; gap:10px; align-items:center;">
                <input type="date" id="dateFilter" onchange="loadLogs()" style="margin-bottom:0; width:auto; cursor:pointer;">
                <div style="text-align:right; flex:1">
                    <span style="font-size:13px; color:#666">ยอดกดลิงก์ของวันที่เลือก:</span>
                    <span id="today-count" style="font-size:24px; font-weight:bold; color:var(--primary); margin-left:8px;">0</span>
                </div>
            </div>
        </div>

        <div class="card" style="padding:0; overflow:hidden;">
            <div style="padding:15px; background:#f8f9fa; font-weight:bold; font-size:14px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; align-items:center;">
                <span>🔥 ไฟล์ยอดนิยม (ตามวันที่เลือก)</span>
                <select id="topLimit" onchange="renderLogsUI()">
                    <option value="5">5 อันดับ</option>
                    <option value="10">10 อันดับ</option>
                    <option value="15">15 อันดับ</option>
                    <option value="20">20 อันดับ</option>
                </select>
            </div>
            <table id="top-table">
                <thead><tr><th width="40">#</th><th>ชื่อไฟล์ / หัวข้อ</th><th width="80" style="text-align:center;">จำนวนครั้ง</th></tr></thead>
                <tbody id="top-body"></tbody>
            </table>
        </div>

        <div class="card" style="padding:0; overflow:hidden;">
            <div style="padding:15px; background:#f8f9fa; border-bottom:1px solid #ddd;">
                <div style="font-weight:bold; font-size:14px; display:flex; justify-content:space-between; align-items:center;">
                    <span>🕒 ประวัติล่าสุด</span>
                    <select id="logLimit" onchange="renderLogsUI()">
                        <option value="20">20 รายการ</option>
                        <option value="50">50 รายการ</option>
                        <option value="all">ทั้งหมด</option>
                    </select>
                </div>
                
                <div class="filter-row">
                    <select id="userFilter" onchange="renderLogsUI()" style="flex:1;">
                        <option value="all">-- ผู้ใช้งานทุกคน --</option>
                    </select>
                    <div style="display:flex; flex:2; gap:5px;">
                        <input type="text" id="logSearchInput" placeholder="ค้นหาไฟล์ในประวัติ..." oninput="renderLogsUI()" style="margin-bottom:0; width:100%;">
                        <button class="btn btn-danger" onclick="clearLogSearch()" style="padding:8px;" title="ล้าง"><i data-lucide="x" style="width:14px;"></i></button>
                    </div>
                </div>
            </div>
            
            <table id="log-table">
                <thead><tr><th>เวลา</th><th>ผู้ใช้งาน</th><th>ไฟล์</th><th>Action</th></tr></thead>
                <tbody id="log-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCN3DS1X6pRi6LxckAitWHmLmsnx5WF7XA",
        authDomain: "linksearch-84695.firebaseapp.com",
        databaseURL: "https://linksearch-84695-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "linksearch-84695",
        storageBucket: "linksearch-84695.appspot.com",
        messagingSenderId: "886580157297",
        appId: "1:886580157297:web:2d843a0f7db6948f9f74d0"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let masterData = [];
    let isNewestFirst = true;
    let dailyLogs = []; // เก็บประวัติของวันที่เลือกไว้ประมวลผล

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('display-user').innerText = user.email;
            document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];
            initData();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
        }
    });

    function formatThaiDisplay(isoString) {
        if (!isoString) return '-';
        try { return new Date(isoString).toLocaleDateString('th-TH', { timeZone: 'Asia/Bangkok' }); } catch (e) { return isoString; }
    }
    function parseThaiDate(dateStr) {
        if (!dateStr) return 0;
        try {
            if (dateStr.includes('T')) return new Date(dateStr).getTime();
            const parts = dateStr.split('/');
            return new Date(parseInt(parts[2]) - 543, parseInt(parts[1]) - 1, parseInt(parts[0])).getTime();
        } catch (e) { return 0; }
    }

    function initData() {
        db.ref('MixLinks').on('value', snap => {
            masterData = Object.values(snap.val() || {}).filter(i => i !== null);
            sortMasterData();
            searchData();
        });
        loadLogs();
    }

    // --- ส่วนของ Search (ฝั่งซ้าย) ---
    function sortMasterData() {
        masterData.sort((a, b) => {
            const da = parseThaiDate(a.spkdate);
            const db = parseThaiDate(b.spkdate);
            return isNewestFirst ? db - da : da - db;
        });
    }

    function toggleSort() {
        isNewestFirst = !isNewestFirst;
        document.getElementById('sortText').innerText = isNewestFirst ? "เรียง: ใหม่ไปเก่า" : "เรียง: เก่าไปใหม่";
        sortMasterData();
        searchData();
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        searchData();
    }

    function searchData() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const searchResultsDiv = document.getElementById('search-results');
        const resultsList = document.getElementById('results-list');
        
        if (query === "") {
            searchResultsDiv.style.display = 'none';
            return;
        }

        const terms = query.split(' ').filter(t => t !== '');
        const results = masterData.filter(item => terms.every(term => (item.linkname || "").toLowerCase().includes(term)));
        
        searchResultsDiv.style.display = 'block';
        document.getElementById('search-count').innerText = `พบทั้งหมด ${results.length} รายการ`;
        
        if (results.length === 0) {
            resultsList.innerHTML = '<div style="padding:40px; text-align:center; color:#888;">ไม่พบข้อมูลที่คุณค้นหา</div>';
            return;
        }

        resultsList.innerHTML = results.map(item => `
            <div style="background: #fff; padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-weight: bold; font-size: 14px; color: #202124; margin-bottom: 4px;">${item.linkname}</div>
                    <div style="font-size: 12px; color: #70757a; display: flex; align-items: center; gap: 4px;">
                        <i data-lucide="calendar" style="width:14px;"></i> ${formatThaiDisplay(item.spkdate)}
                    </div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-icon" onclick="handleAction('${item.linkname}', '${item.link}', 'copy')" style="background:#fff; border:1px solid #ddd; padding:6px; border-radius:6px; cursor:pointer;" title="Copy"><i data-lucide="copy" style="width:14px;"></i></button>
                    <button class="btn-icon" onclick="handleAction('${item.linkname}', '${item.link}', 'open')" style="background:#fff; border:1px solid #ddd; padding:6px; border-radius:6px; cursor:pointer;" title="Open"><i data-lucide="external-link" style="width:14px;"></i></button>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    // --- ส่วนของ Logs (ฝั่งขวา) ---
    function loadLogs() {
        const targetDate = document.getElementById('dateFilter').value;
        db.ref('logs').on('value', snap => {
            const logs = Object.values(snap.val() || {});
            
            // เก็บข้อมูลเฉพาะวันที่เลือกลงในตัวแปร global
            dailyLogs = logs.filter(l => new Date(l.timestamp).toISOString().split('T')[0] === targetDate);
            document.getElementById('today-count').innerText = dailyLogs.length;

            // อัปเดตรายชื่อผู้ใช้ใน Dropdown ให้มีเฉพาะคนที่ล็อคอินในวันนี้
            const users = [...new Set(dailyLogs.map(l => l.user))].sort();
            const userSelect = document.getElementById('userFilter');
            const currentUser = userSelect.value; // จำค่าเดิมไว้
            
            userSelect.innerHTML = '<option value="all">-- ผู้ใช้งานทุกคน --</option>' + 
                users.map(u => `<option value="${u}">${u.split('@')[0]}</option>`).join('');
            
            if(users.includes(currentUser)) userSelect.value = currentUser; // คงค่าเดิมไว้ถ้ามี

            renderLogsUI(); // เรียกฟังก์ชันอัปเดตหน้าจอ
        });
    }

    function clearLogSearch() {
        document.getElementById('logSearchInput').value = '';
        renderLogsUI();
    }

    // ฟังก์ชันนี้รับหน้าที่ "กรองและแสดงผล" ตาม Dropdown ที่เลือก
    function renderLogsUI() {
        // 1. จัดการตารางยอดนิยม (Top Files)
        const topLimit = parseInt(document.getElementById('topLimit').value);
        const freq = {};
        dailyLogs.forEach(l => freq[l.linkname] = (freq[l.linkname] || 0) + 1);
        const sortedTop = Object.keys(freq).map(k => ({n:k, c:freq[k]})).sort((a,b)=>b.c-a.c).slice(0, topLimit);
        
        const topBody = document.getElementById('top-body');
        if(sortedTop.length === 0) {
            topBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888;">ไม่มีข้อมูลในวันนี้</td></tr>';
        } else {
            topBody.innerHTML = sortedTop.map((item, i) => `
                <tr><td><span class="rank-badge">${i+1}</span></td><td>${item.n}</td><td style="text-align:center; font-size:14px;"><b>${item.c}</b></td></tr>
            `).join('');
        }

        // 2. จัดการตารางประวัติล่าสุด (Recent Logs)
        const userFilter = document.getElementById('userFilter').value;
        const searchInput = document.getElementById('logSearchInput').value.toLowerCase().trim();
        const logLimit = document.getElementById('logLimit').value;

        // คัดลอกและกลับด้านให้ใหม่ล่าสุดอยู่บน
        let filteredLogs = [...dailyLogs].reverse(); 

        // กรองตามผู้ใช้
        if (userFilter !== 'all') {
            filteredLogs = filteredLogs.filter(l => l.user === userFilter);
        }

        // กรองตามคำค้นหา
        if (searchInput !== '') {
            filteredLogs = filteredLogs.filter(l => (l.linkname || '').toLowerCase().includes(searchInput));
        }

        // ตัดจำนวนตาม Limit
        if (logLimit !== 'all') {
            filteredLogs = filteredLogs.slice(0, parseInt(logLimit));
        }

        const logBody = document.getElementById('log-body');
        if(filteredLogs.length === 0) {
            logBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888;">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</td></tr>';
        } else {
            logBody.innerHTML = filteredLogs.map(l => `
                <tr>
                    <td style="color:#70757a; font-size:12px;">${new Date(l.timestamp).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} น.</td>
                    <td>${l.user.split('@')[0]}</td>
                    <td style="max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${l.linkname}">${l.linkname}</td>
                    <td><span class="action-tag" style="background:${l.action==='copy'?'#e8f0fe':'#e6f4ea'}; color:${l.action==='copy'?'#1a73e8':'#1e8e3e'}">${l.action}</span></td>
                </tr>
            `).join('');
        }
    }

    // Actions
    function handleAction(name, url, type) {
        db.ref('logs').push({ user: auth.currentUser.email, linkname: name, action: type, timestamp: new Date().toISOString() });
        if (type === 'copy') { navigator.clipboard.writeText(url).then(() => alert('คัดลอกเรียบร้อยแล้ว!')); } 
        else { window.open(url, '_blank'); }
    }

    function login() {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-pass').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert("ลองใหม่อีกครั้ง: " + err.message));
    }
    function logout() { auth.signOut(); }
</script>
</body>
</html>
