<script>
    // 1. ข้อมูล Config ของคุณ (ตรวจสอบให้มั่นใจว่าใส่ API Key และ App ID ครบถ้วน)
    const firebaseConfig = {
        apiKey: "AIzaSyCN3DS1X6pRi6LxckAitWHmLmsnx5WF7XA",
        authDomain: "linksearch-84695.firebaseapp.com",
        databaseURL: "https://linksearch-84695-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "linksearch-84695",
        storageBucket: "linksearch-84695.appspot.com",
        messagingSenderId: "886580157297",
        appId: "1:886580157297:web:2d843a0f7db6948f9f74d0"
    };

    // 2. เริ่มต้นการทำงาน (แก้ไขจุดที่ Error)
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // 3. ระบบตรวจสอบสถานะ Login (ย้ายมาไว้หลังกำหนดตัวแปร auth)
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('search-section').style.display = 'block';
            loadData();
        } else {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('search-section').style.display = 'none';
        }
    });

    // 4. ฟังก์ชันสำหรับปุ่มกด (ต้องใช้ฟังก์ชันปกติเพื่อให้ HTML เรียกเจอ)
    window.login = function() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        
        if(!email || !pass) {
            alert("กรุณากรอก Email และ Password");
            return;
        }

        auth.signInWithEmailAndPassword(email, pass)
            .then(() => {
                console.log("Login Success");
            })
            .catch(err => {
                console.error(err);
                alert("เข้าสู่ระบบไม่สำเร็จ: " + err.message);
            });
    }

    window.logout = function() {
        auth.signOut();
    }

    // --- ส่วนที่เหลือ (loadData, displayResults, handleAction) ให้คงเดิมไว้ครับ ---
    let allData = [];
    function loadData() {
        db.ref('data').on('value', snapshot => {
            allData = snapshot.val() || [];
            displayResults(allData);
        }, error => {
            console.error("Database Error:", error);
            if(error.code === "PERMISSION_DENIED") {
                alert("คุณไม่มีสิทธิ์เข้าถึงฐานข้อมูล กรุณาเช็ค Rules ใน Firebase");
            }
        });
    }

    function displayResults(items) {
        const container = document.getElementById('results');
        container.innerHTML = '';
        if (!items || items.length === 0) {
            container.innerHTML = '<div style="padding:20px; text-align:center;">ไม่พบข้อมูล</div>';
            return;
        }

        items.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'result-item';
            const isLink = item.link && item.link.startsWith('http');
            const actionHtml = isLink ? `
                <div class="actions">
                    <button class="btn-icon" onclick="handleAction('${item.linkname}', '${item.link}', 'copy')" title="Copy"><i data-lucide="copy" class="icon"></i></button>
                    <button class="btn-icon" onclick="handleAction('${item.linkname}', '${item.link}', 'open')" title="Open"><i data-lucide="external-link" class="icon"></i></button>
                </div>
            ` : '';

            div.innerHTML = `
                <div class="info">
                    <div class="link-name">${item.linkname || 'ไม่มีชื่อ'}</div>
                    <div class="date">${item.spkdate || ''}</div>
                </div>
                ${actionHtml}
            `;
            container.appendChild(div);
        });
        if(window.lucide) lucide.createIcons();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const terms = query.split(' ').filter(t => t !== '');
        const filtered = allData.filter(item => {
            const name = (item.linkname || "").toLowerCase();
            return terms.every(term => name.includes(term));
        });
        displayResults(filtered);
    });

    window.handleAction = function(name, url, type) {
        const user = auth.currentUser;
        const logData = {
            user: user ? user.email : 'unknown',
            linkname: name,
            action: type,
            timestamp: new Date().toISOString(),
            dateOnly: new Date().toLocaleDateString('th-TH')
        };

        db.ref('logs').push(logData);

        if (type === 'copy') {
            navigator.clipboard.writeText(url);
            alert('คัดลอกลิงก์สำเร็จ!');
        } else {
            window.open(url, '_blank');
        }
    }
</script>
