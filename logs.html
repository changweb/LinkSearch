<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixLinks - Log Analytics</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 14px; color: #70757a; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 28px; font-weight: bold; color: #1a73e8; }

        .table-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 20px; }
        .table-header { padding: 15px 20px; background: #f1f3f4; font-weight: bold; border-bottom: 1px solid #ddd; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 20px; text-align: left; border-bottom: 1px solid #f1f3f4; font-size: 14px; }
        th { background: #fafafa; color: #5f6368; }
        
        .rank-badge { background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 12px; }
        .back-btn { text-decoration: none; color: #5f6368; display: flex; align-items: center; gap: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <a href="index.html" class="back-btn"><i data-lucide="arrow-left" style="width:16px;"></i> กลับหน้าค้นหา</a>
            <h1 style="margin: 10px 0 0 0;">📊 รายงานการใช้งาน (Logs)</h1>
        </div>
        <button onclick="location.reload()" style="padding: 8px 15px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer;">
            <i data-lucide="refresh-cw" style="width:14px; vertical-align: middle;"></i> อัปเดตข้อมูล
        </button>
    </div>

    <div class="grid">
        <div class="stat-card">
            <h3>จำนวนการเข้าถึงทั้งหมด</h3>
            <div class="value" id="total-clicks">0</div>
        </div>
        <div class="stat-card">
            <h3>ไฟล์ที่ถูกใช้งานซ้ำมากที่สุด</h3>
            <div class="value" id="top-file-name" style="font-size: 18px; color: #d93025;">-</div>
        </div>
    </div>

    <div class="table-card">
        <div class="table-header">🔥 5 อันดับไฟล์ที่ถูกเปิด/คัดลอกบ่อยที่สุด</div>
        <table>
            <thead>
                <tr>
                    <th width="80">อันดับ</th>
                    <th>ชื่อไฟล์ / หัวข้อ</th>
                    <th width="100" style="text-align: center;">จำนวนครั้ง</th>
                </tr>
            </thead>
            <tbody id="top-list-body">
                </tbody>
        </table>
    </div>

    <div class="table-card">
        <div class="table-header">🕒 ประวัติการใช้งานล่าสุด (10 รายการล่าสุด)</div>
        <table>
            <thead>
                <tr>
                    <th>เวลา</th>
                    <th>ผู้ใช้งาน</th>
                    <th>ไฟล์</th>
                    <th>การกระทำ</th>
                </tr>
            </thead>
            <tbody id="recent-logs-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCN3DS1X6pRi6LxckAitWHmLmsnx5WF7XA",
        authDomain: "linksearch-84695.firebaseapp.com",
        databaseURL: "https://linksearch-84695-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "linksearch-84695",
        storageBucket: "linksearch-84695.appspot.com",
        messagingSenderId: "886580157297",
        appId: "1:886580157297:web:2d843a0f7db6948f9f74d0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadLogs() {
        db.ref('logs').on('value', snapshot => {
            const data = snapshot.val();
            if (!data) return;

            const logsArray = Object.values(data);
            
            // 1. แสดงจำนวนทั้งหมด
            document.getElementById('total-clicks').innerText = logsArray.length.toLocaleString();

            // 2. คำนวณความถี่ไฟล์ (Count Frequency)
            const frequency = {};
            logsArray.forEach(log => {
                const name = log.linkname || "ไม่ทราบชื่อ";
                frequency[name] = (frequency[name] || 0) + 1;
            });

            // แปลงเป็น Array และเรียงลำดับ
            const sortedFiles = Object.keys(frequency).map(name => ({
                name: name,
                count: frequency[name]
            })).sort((a, b) => b.count - a.count);

            // แสดงชื่อไฟล์อันดับ 1 ใน Stat Card
            if(sortedFiles.length > 0) {
                document.getElementById('top-file-name').innerText = sortedFiles[0].name;
            }

            // 3. แสดง Top 5 ในตาราง
            const topBody = document.getElementById('top-list-body');
            topBody.innerHTML = '';
            sortedFiles.slice(0, 5).forEach((item, index) => {
                topBody.innerHTML += `
                    <tr>
                        <td style="text-align:center;"><span class="rank-badge">${index + 1}</span></td>
                        <td>${item.name}</td>
                        <td style="text-align:center; font-weight:bold;">${item.count}</td>
                    </tr>
                `;
            });

            // 4. แสดงประวัติล่าสุด 10 รายการ
            const recentBody = document.getElementById('recent-logs-body');
            recentBody.innerHTML = '';
            logsArray.reverse().slice(0, 10).forEach(log => {
                const date = new Date(log.timestamp).toLocaleString('th-TH');
                recentBody.innerHTML += `
                    <tr>
                        <td style="font-size:12px; color:#70757a;">${date}</td>
                        <td>${log.user.split('@')[0]}</td>
                        <td>${log.linkname}</td>
                        <td><span style="color:${log.action === 'copy' ? '#1a73e8' : '#34a853'}">${log.action}</span></td>
                    </tr>
                `;
            });
        });
    }

    window.onload = () => {
        // ในหน้า Logs นี้ ถ้าไม่ได้ Login ให้เด้งกลับไปหน้าหลัก
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                loadLogs();
            } else {
                window.location.href = 'index.html';
            }
        });
        lucide.createIcons();
    };
</script>
</body>
</html>
